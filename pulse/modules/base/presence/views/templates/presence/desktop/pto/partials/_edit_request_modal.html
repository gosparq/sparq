<!-- Edit PTO Request Modal -->
<div class="modal fade show" id="editPtoRequestModal" tabindex="-1" style="display: block; background: rgba(0,0,0,0.5);">
    <div class="modal-dialog">
        <div class="modal-content">
            <form hx-post="{{ url_for('pto_bp.edit_request', request_id=leave_request.id) }}"
                  hx-target="#modals"
                  hx-swap="innerHTML"
                  x-data="{
                      startDate: '{{ form_data.start_date if form_data else leave_request.start_date.isoformat() }}',
                      endDate: '{{ form_data.end_date if form_data else leave_request.end_date.isoformat() }}',
                      get totalDays() {
                          if (!this.startDate || !this.endDate) return 0;
                          const start = new Date(this.startDate);
                          const end = new Date(this.endDate);
                          const diff = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
                          return diff > 0 ? diff : 0;
                      }
                  }">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-edit me-2"></i>{{ _("Edit Request") }}
                    </h5>
                    <button type="button" class="btn-close"
                            hx-get="{{ url_for('pto_bp.clear_modal') }}"
                            hx-target="#modals"
                            hx-swap="innerHTML"></button>
                </div>
                <div class="modal-body">
                    {% if overlap_error %}
                    <div class="alert alert-danger mb-3">
                        <i class="fas fa-exclamation-triangle me-2"></i>{{ overlap_error }}
                    </div>
                    {% endif %}

                    {% if leave_request.admin_notes %}
                    <div class="alert alert-warning mb-3">
                        <i class="fas fa-comment-dots me-2"></i>
                        <strong>{{ _("Admin Feedback:") }}</strong> {{ leave_request.admin_notes }}
                    </div>
                    {% endif %}

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label" for="leave_type">{{ _("Type") }} <span class="text-danger">*</span></label>
                            <select name="leave_type" id="leave_type" class="form-select" required>
                                <option value="">{{ _("Select type...") }}</option>
                                {% for lt in leave_types %}
                                <option value="{{ lt.name }}" {% if (form_data and form_data.leave_type == lt.name) or (not form_data and leave_request.leave_type == lt) %}selected{% endif %}>{{ lt.value }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">{{ _("Total Days") }}</label>
                            <div class="form-control-plaintext">
                                <span class="badge bg-primary fs-6" x-text="totalDays + ' {{ _('days') }}'"></span>
                            </div>
                        </div>

                        <!-- Dates -->
                        <div class="col-md-6">
                            <label class="form-label" for="start_date">{{ _("Start Date") }} <span class="text-danger">*</span></label>
                            <input type="date" name="start_date" id="start_date" class="form-control" required
                                   x-model="startDate" min="{{ today }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="end_date">{{ _("End Date") }} <span class="text-danger">*</span></label>
                            <input type="date" name="end_date" id="end_date" class="form-control" required
                                   x-model="endDate" :min="startDate">
                        </div>

                        <!-- Notes -->
                        <div class="col-12">
                            <label class="form-label" for="employee_notes">{{ _("Notes") }} <small class="text-muted">({{ _("optional") }})</small></label>
                            <textarea name="employee_notes" id="employee_notes" class="form-control" rows="2"
                                      placeholder="{{ _('Reason for time off request...') }}">{{ form_data.employee_notes if form_data else (leave_request.employee_notes or '') }}</textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-sm btn-outline-secondary"
                            hx-get="{{ url_for('pto_bp.clear_modal') }}"
                            hx-target="#modals"
                            hx-swap="innerHTML">
                        {{ _("Cancel") }}
                    </button>
                    <button type="submit" class="btn btn-sm btn-primary">
                        <i class="fas fa-save me-1"></i>{{ _("Save Changes") }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
