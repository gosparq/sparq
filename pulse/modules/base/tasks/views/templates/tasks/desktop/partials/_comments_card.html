{# Comments section — included on detail page between Attachments and Activity #}
<div class="task-detail-card">
    <div class="task-detail-card-header">
        <span class="task-detail-card-title">
            <i class="fas fa-comments me-1 task-comment-action-icon"></i>
            {{ _("Comments") }}
            {% if comments %}<span class="text-muted">({{ comments|length }})</span>{% endif %}
        </span>
    </div>
    <div class="task-detail-card-body--lg">
        {# Comments list (HTMX swap target) #}
        <div id="comments-list">
            {% include 'tasks/desktop/partials/_comments_list.html' %}
        </div>

        {# Add comment form #}
        <form hx-post="{{ url_for('tasks_bp.create_comment', item_id=item.id) }}"
              hx-target="#comments-list"
              hx-swap="innerHTML"
              hx-on::after-request="if(event.detail.successful) this.reset()"
              class="mt-3">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <textarea name="content"
                      class="form-control form-control-sm task-comment-textarea"
                      rows="2"
                      maxlength="2000"
                      placeholder="{{ _('Add a comment...') }}"
                      required></textarea>
            <div class="d-flex justify-content-end mt-2">
                <button type="submit" class="btn btn-sm btn-outline-primary"
                        hx-disabled-elt="this">
                    <i class="fas fa-paper-plane me-1"></i>{{ _("Comment") }}
                </button>
            </div>
        </form>
    </div>
</div>
