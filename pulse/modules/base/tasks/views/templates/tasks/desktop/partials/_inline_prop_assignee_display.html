<div id="prop-assignee" class="task-prop-section">
    <div class="task-prop-header">
        <span class="task-prop-label">{% if item.is_blocker %}{{ _("Blocked By") }}{% else %}{{ _("Assigned To") }}{% endif %}</span>
        {% if can_inline_edit %}
        <button class="task-prop-edit-trigger"
                hx-get="{{ url_for('tasks_bp.inline_edit_prop', item_id=item.id, prop='assignee') }}"
                hx-target="#prop-assignee"
                hx-swap="outerHTML">
            <i class="fas fa-pen"></i>
        </button>
        {% endif %}
    </div>
    <div>
        {% if item.assignee and item.assignee.user %}
        {{ item.assignee.user.first_name }} {{ item.assignee.user.last_name }}
        {% else %}
        <span class="text-muted small">{{ _("Unassigned") }}</span>
        {% endif %}
    </div>
</div>
