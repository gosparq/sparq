<div class="step-header mb-4">
    <h4><i class="fas fa-user me-2"></i>{{ _("Personal Information") }}</h4>
    <p class="text-muted">{{ _("Please provide your personal information and contact details.") }}</p>
</div>

<form data-action="form-submit" data-task-key="personal_info">
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">{{ _("Phone Number") }}</label>
            <input type="tel" class="form-control" name="phone"
                   value="{{ record.member.phone or '' if record.member else '' }}"
                   placeholder="(555) 123-4567">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">{{ _("Date of Birth") }}</label>
            <input type="date" class="form-control" name="birthday"
                   value="{{ record.member.user.birthday.isoformat() if record.member and record.member.user.birthday else '' }}">
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">{{ _("Street Address") }}</label>
        <input type="text" class="form-control" name="address"
               value="{{ record.member.user.address or '' if record.member else '' }}"
               placeholder="123 Main Street">
    </div>

    <div class="mb-3">
        <label class="form-label">{{ _("Address Line 2") }}</label>
        <input type="text" class="form-control" name="address_2"
               value="{{ record.member.user.address_2 or '' if record.member else '' }}"
               placeholder="Apt 4">
    </div>

    <div class="row">
        <div class="col-md-5 mb-3">
            <label class="form-label">{{ _("City") }}</label>
            <input type="text" class="form-control" name="city"
                   value="{{ record.member.user.city or '' if record.member else '' }}"
                   placeholder="Minneapolis">
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">{{ _("State") }}</label>
            <input type="text" class="form-control" name="state"
                   value="{{ record.member.user.state or '' if record.member else '' }}"
                   placeholder="MN">
        </div>
        <div class="col-md-3 mb-3">
            <label class="form-label">{{ _("ZIP Code") }}</label>
            <input type="text" class="form-control" name="zip_code"
                   value="{{ record.member.user.zip_code or '' if record.member else '' }}"
                   placeholder="55401">
        </div>
    </div>

    <hr class="my-4">

    <div class="d-flex justify-content-end gap-2">
        <button type="submit" class="btn btn-sm btn-primary">
            <i class="fas fa-save me-2"></i>{{ _("Save & Continue") }}
        </button>
    </div>
</form>
<script nonce="{{ csp_nonce }}">
(function() {
    document.querySelectorAll('form[data-action="form-submit"]').forEach(function(form) {
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            handleFormSubmit(this, this.dataset.taskKey);
        });
    });
})();
</script>
