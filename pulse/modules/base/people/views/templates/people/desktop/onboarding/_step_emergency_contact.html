<div class="step-header mb-4">
    <h4><i class="fas fa-phone-alt me-2"></i>{{ _("Emergency Contact") }}</h4>
    <p class="text-muted">{{ _("Please provide an emergency contact who we can reach in case of an emergency.") }}</p>
</div>

<form data-action="form-submit" data-task-key="emergency_contact">
    <div class="mb-3">
        <label class="form-label">{{ _("Contact Name") }} <span class="text-danger">*</span></label>
        <input type="text" class="form-control" name="emergency_contact_name" required
               value="{{ record.member.user.emergency_contact_name or '' if record.member else '' }}"
               placeholder="Jane Doe">
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">{{ _("Phone Number") }} <span class="text-danger">*</span></label>
            <input type="tel" class="form-control" name="emergency_contact_phone" required
                   value="{{ record.member.user.emergency_contact_phone or '' if record.member else '' }}"
                   placeholder="(555) 123-4567">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">{{ _("Relationship") }}</label>
            <select class="form-select" name="emergency_contact_relationship">
                <option value="">{{ _("Select...") }}</option>
                {% set current_rel = record.member.user.emergency_contact_relationship if record.member else '' %}
                <option value="Spouse" {% if current_rel == 'Spouse' %}selected{% endif %}>{{ _("Spouse") }}</option>
                <option value="Parent" {% if current_rel == 'Parent' %}selected{% endif %}>{{ _("Parent") }}</option>
                <option value="Sibling" {% if current_rel == 'Sibling' %}selected{% endif %}>{{ _("Sibling") }}</option>
                <option value="Child" {% if current_rel == 'Child' %}selected{% endif %}>{{ _("Child") }}</option>
                <option value="Friend" {% if current_rel == 'Friend' %}selected{% endif %}>{{ _("Friend") }}</option>
                <option value="Other" {% if current_rel == 'Other' %}selected{% endif %}>{{ _("Other") }}</option>
            </select>
        </div>
    </div>

    <hr class="my-4">

    <div class="d-flex justify-content-between">
        {% if not current_task.required %}
        <button type="button" class="btn btn-sm btn-outline-secondary" data-action="skip-task" data-task-key="emergency_contact">
            <i class="fas fa-forward me-2"></i>{{ _("Skip for Now") }}
        </button>
        {% else %}
        <div></div>
        {% endif %}
        <button type="submit" class="btn btn-sm btn-primary">
            <i class="fas fa-save me-2"></i>{{ _("Save & Continue") }}
        </button>
    </div>
</form>
<script nonce="{{ csp_nonce }}">
(function() {
    document.querySelectorAll('form[data-action="form-submit"]').forEach(function(form) {
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            handleFormSubmit(this, this.dataset.taskKey);
        });
    });
    document.querySelectorAll('[data-action="skip-task"]').forEach(function(btn) {
        btn.addEventListener('click', function() {
            skipTask(this.dataset.taskKey);
        });
    });
})();
</script>
