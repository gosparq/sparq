<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}{% endblock %} - sparQ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="icon" type="image/png" href="{{ url_for('core_bp.static', filename='images/favicon-96x96.png') }}" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('core_bp.static', filename='images/favicon.svg') }}">
    <link rel="shortcut icon" href="{{ url_for('core_bp.static', filename='images/favicon.ico') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('core_bp.static', filename='images/apple-touch-icon.png') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('core_bp.static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('core_bp.static', filename='css/mobile-auth.css') }}">
    {% block additional_styles %}{% endblock %}
    <meta name="csrf-token" content="{{ csrf_token }}">
</head>
<body>
    <div class="mobile-auth-wrapper">
        {% block auth_content %}{% endblock %}
    </div>

    <script nonce="{{ csp_nonce }}" src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script nonce="{{ csp_nonce }}" defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
