<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sparQ — Theme Preview</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
/* ==========================================
   Reset & Base
   ========================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f1f5f9;
    color: #111827;
    min-height: 100vh;
}

/* ==========================================
   Theme Switcher Bar
   ========================================== */
.theme-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #111827;
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 1.5rem;
    height: 48px;
    gap: 1.5rem;
}

.theme-bar-title {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    opacity: 0.6;
    white-space: nowrap;
}

.theme-tabs {
    display: flex;
    gap: 0.25rem;
}

.theme-tab {
    padding: 0.4rem 1rem;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: #94a3b8;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
}

.theme-tab:hover { color: #e2e8f0; background: rgba(255,255,255,0.08); }
.theme-tab.active { color: #fff; background: rgba(255,255,255,0.15); }

.theme-bar-hint {
    margin-left: auto;
    font-size: 0.8rem;
    opacity: 0.4;
}

/* ==========================================
   App Shell — shared structure
   ========================================== */
.app-shell {
    display: flex;
    height: calc(100vh - 48px);
    overflow: hidden;
}

.shell-sidebar {
    display: flex;
    flex-direction: column;
    overflow-y: auto;
}

.shell-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
}

.shell-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
}

.shell-content {
    flex: 1;
    padding: 1.5rem;
}

/* Workspace switcher */
.ws-switcher {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
}

.ws-avatar {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
}

.ws-name {
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.ws-swap { opacity: 0.4; font-size: 0.7rem; }

/* Nav sections */
.s-section-label {
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 700;
}

.s-nav-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
    border-radius: 6px;
    transition: background 0.12s, color 0.12s;
}

.s-nav-item i { width: 16px; text-align: center; flex-shrink: 0; }

.s-divider { border: none; }

/* Dashboard cards */
.dash-grid {
    display: grid;
    gap: 1rem;
}

.dash-card {
    border-radius: 8px;
    padding: 1.25rem;
}

.dash-card-title {
    font-weight: 600;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.dash-card-title i { opacity: 0.5; }

.dash-stat {
    font-weight: 700;
}

.dash-stat-label {
    font-weight: 400;
}

.dash-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid transparent;
}

.dash-row:last-child { border-bottom: none; }

.dash-badge {
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    font-weight: 600;
    white-space: nowrap;
}

.dash-bar {
    border-radius: 4px;
    overflow: hidden;
}

.dash-bar-fill {
    height: 100%;
    border-radius: 4px;
}

/* User avatar in header */
.user-avatar {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-weight: 600;
    color: #fff;
    flex-shrink: 0;
}

.header-search {
    display: flex;
    align-items: center;
    border-radius: 6px;
}

.header-search i { opacity: 0.4; }
.header-search input {
    border: none;
    outline: none;
    background: transparent;
    font-size: inherit;
    color: inherit;
    width: 160px;
}

/* ==========================================
   THEME A — Refined
   ========================================== */
.theme-a {
    --t-accent: var(--color-focus);
    --t-accent-light: #ede9fe;
    --t-bg: #f9fafb;
    --t-sidebar-bg: #ffffff;
    --t-sidebar-border: #e5e7eb;
    --t-header-bg: #ffffff;
    --t-header-border: #e5e7eb;
    --t-card-bg: #ffffff;
    --t-card-border: #e5e7eb;
    --t-text: #111827;
    --t-text-secondary: #6b7280;
    --t-text-muted: #9ca3af;
    --t-hover: #f3f4f6;
    --t-active-bg: #ede9fe;
    --t-active-text: var(--color-focus);
    --t-divider: #f3f4f6;
    --t-font-size: 13px;
    --t-sidebar-width: 220px;
    --t-nav-padding: 0.3rem 0.625rem;
    --t-section-gap: 0.125rem;
    --t-card-shadow: none;
    --t-card-radius: 8px;
    --t-header-height: 44px;
}

.theme-a .shell-sidebar {
    width: var(--t-sidebar-width);
    min-width: var(--t-sidebar-width);
    background: var(--t-sidebar-bg);
    border-right: 1px solid var(--t-sidebar-border);
    font-size: var(--t-font-size);
}

.theme-a .ws-switcher {
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--t-divider);
}

.theme-a .ws-avatar {
    width: 24px; height: 24px; font-size: 0.65rem;
    background: var(--t-accent);
}

.theme-a .ws-name { font-size: 0.8rem; color: var(--t-text); }

.theme-a .s-nav {
    padding: 0.375rem 0.5rem;
    flex: 1;
}

.theme-a .s-section { margin-bottom: 0.25rem; }

.theme-a .s-section-label {
    font-size: 0.65rem;
    color: var(--t-text-muted);
    padding: 0.375rem 0.625rem 0.2rem;
}

.theme-a .s-nav-item {
    padding: var(--t-nav-padding);
    font-size: var(--t-font-size);
    color: var(--t-text-secondary);
}

.theme-a .s-nav-item:hover { background: var(--t-hover); color: var(--t-text); }
.theme-a .s-nav-item.active { background: var(--t-active-bg); color: var(--t-active-text); font-weight: 600; }
.theme-a .s-nav-item i { font-size: 0.75rem; }

.theme-a .s-divider {
    margin: 0.25rem 0.625rem;
    border-top: 1px solid var(--t-divider);
}

.theme-a .shell-header {
    height: var(--t-header-height);
    background: var(--t-header-bg);
    border-bottom: 1px solid var(--t-header-border);
    padding: 0 1.25rem;
    font-size: var(--t-font-size);
}

.theme-a .shell-content { background: var(--t-bg); }

.theme-a .dash-grid { grid-template-columns: repeat(3, 1fr); }

.theme-a .dash-card {
    background: var(--t-card-bg);
    border: 1px solid var(--t-card-border);
    box-shadow: var(--t-card-shadow);
    border-radius: var(--t-card-radius);
    font-size: var(--t-font-size);
}

.theme-a .dash-card-title { font-size: 0.8rem; color: var(--t-text); }
.theme-a .dash-stat { font-size: 1.75rem; color: var(--t-text); }
.theme-a .dash-stat-label { font-size: 0.8rem; color: var(--t-text-muted); }

.theme-a .dash-row {
    padding: 0.4rem 0;
    font-size: var(--t-font-size);
    border-bottom-color: var(--t-divider);
    color: var(--t-text-secondary);
}

.theme-a .dash-badge {
    font-size: 0.7rem;
    background: var(--t-accent-light);
    color: var(--t-accent);
}

.theme-a .dash-bar { height: 6px; background: var(--t-divider); }
.theme-a .dash-bar-fill { background: var(--t-accent); }

.theme-a .user-avatar {
    width: 28px; height: 28px; font-size: 0.7rem;
    background: var(--t-accent);
}

.theme-a .header-search {
    padding: 0.3rem 0.6rem;
    gap: 0.4rem;
    background: var(--t-hover);
    font-size: var(--t-font-size);
    color: var(--t-text-secondary);
}

.theme-a .header-search input { font-size: var(--t-font-size); color: var(--t-text); }

/* ==========================================
   THEME B — Slate (ClickUp-inspired)
   ========================================== */
.theme-b {
    --t-accent: #3b82f6;
    --t-accent-light: #dbeafe;
    --t-bg: #f8fafc;
    --t-sidebar-bg: #1e293b;
    --t-sidebar-border: #334155;
    --t-header-bg: #ffffff;
    --t-header-border: #e2e8f0;
    --t-card-bg: #ffffff;
    --t-card-border: #e2e8f0;
    --t-text: #0f172a;
    --t-text-secondary: #475569;
    --t-text-muted: #94a3b8;
    --t-hover: rgba(255,255,255,0.06);
    --t-active-bg: rgba(59,130,246,0.15);
    --t-active-text: #60a5fa;
    --t-divider: #334155;
    --t-font-size: 13px;
    --t-sidebar-width: 230px;
    --t-nav-padding: 0.25rem 0.625rem;
    --t-card-shadow: none;
    --t-card-radius: 6px;
    --t-header-height: 42px;
}

.theme-b .shell-sidebar {
    width: var(--t-sidebar-width);
    min-width: var(--t-sidebar-width);
    background: var(--t-sidebar-bg);
    border-right: 1px solid var(--t-sidebar-border);
    font-size: var(--t-font-size);
    color: #cbd5e1;
}

.theme-b .ws-switcher {
    padding: 0.5rem 0.625rem;
    border-bottom: 1px solid var(--t-divider);
}

.theme-b .ws-avatar {
    width: 22px; height: 22px; font-size: 0.6rem;
    background: var(--t-accent);
    border-radius: 4px;
}

.theme-b .ws-name { font-size: 0.8rem; color: #e2e8f0; }
.theme-b .ws-swap { color: #64748b; }

.theme-b .s-nav {
    padding: 0.25rem 0.375rem;
    flex: 1;
}

.theme-b .s-section { margin-bottom: 0.125rem; }

.theme-b .s-section-label {
    font-size: 0.6rem;
    color: #64748b;
    padding: 0.5rem 0.625rem 0.15rem;
}

.theme-b .s-nav-item {
    padding: var(--t-nav-padding);
    font-size: var(--t-font-size);
    color: #94a3b8;
    border-radius: 4px;
}

.theme-b .s-nav-item:hover { background: var(--t-hover); color: #e2e8f0; }
.theme-b .s-nav-item.active { background: var(--t-active-bg); color: var(--t-active-text); font-weight: 600; }
.theme-b .s-nav-item i { font-size: 0.7rem; }

.theme-b .s-divider {
    margin: 0.25rem 0.625rem;
    border-top: 1px solid var(--t-divider);
}

.theme-b .shell-header {
    height: var(--t-header-height);
    background: var(--t-header-bg);
    border-bottom: 1px solid var(--t-header-border);
    padding: 0 1.25rem;
    font-size: var(--t-font-size);
}

.theme-b .shell-content { background: var(--t-bg); }

.theme-b .dash-grid { grid-template-columns: repeat(3, 1fr); }

.theme-b .dash-card {
    background: var(--t-card-bg);
    border: 1px solid var(--t-card-border);
    box-shadow: var(--t-card-shadow);
    border-radius: var(--t-card-radius);
    font-size: var(--t-font-size);
}

.theme-b .dash-card-title { font-size: 0.8rem; color: var(--t-text); }
.theme-b .dash-stat { font-size: 1.75rem; color: var(--t-text); }
.theme-b .dash-stat-label { font-size: 0.8rem; color: var(--t-text-muted); }

.theme-b .dash-row {
    padding: 0.35rem 0;
    font-size: var(--t-font-size);
    border-bottom-color: #f1f5f9;
    color: var(--t-text-secondary);
}

.theme-b .dash-badge {
    font-size: 0.7rem;
    background: var(--t-accent-light);
    color: var(--t-accent);
}

.theme-b .dash-bar { height: 5px; background: #f1f5f9; }
.theme-b .dash-bar-fill { background: var(--t-accent); }

.theme-b .user-avatar {
    width: 26px; height: 26px; font-size: 0.65rem;
    background: var(--t-accent);
}

.theme-b .header-search {
    padding: 0.25rem 0.6rem;
    gap: 0.4rem;
    background: #f1f5f9;
    font-size: var(--t-font-size);
    color: var(--t-text-secondary);
    border: 1px solid var(--t-header-border);
}

.theme-b .header-search input { font-size: var(--t-font-size); color: var(--t-text); }

/* ==========================================
   THEME C — Minimal (Linear/Notion-inspired)
   ========================================== */
.theme-c {
    --t-accent: #6366f1;
    --t-accent-light: #e0e7ff;
    --t-bg: #ffffff;
    --t-sidebar-bg: #fafafa;
    --t-sidebar-border: #f1f5f9;
    --t-header-bg: #ffffff;
    --t-header-border: #f1f5f9;
    --t-card-bg: #ffffff;
    --t-card-border: #f1f5f9;
    --t-text: #18181b;
    --t-text-secondary: #52525b;
    --t-text-muted: #a1a1aa;
    --t-hover: #f4f4f5;
    --t-active-bg: #eef2ff;
    --t-active-text: #6366f1;
    --t-divider: #f4f4f5;
    --t-font-size: 13.5px;
    --t-sidebar-width: 240px;
    --t-nav-padding: 0.35rem 0.75rem;
    --t-card-shadow: 0 1px 2px rgba(0,0,0,0.04);
    --t-card-radius: 10px;
    --t-header-height: 46px;
}

.theme-c .shell-sidebar {
    width: var(--t-sidebar-width);
    min-width: var(--t-sidebar-width);
    background: var(--t-sidebar-bg);
    border-right: 1px solid var(--t-sidebar-border);
    font-size: var(--t-font-size);
}

.theme-c .ws-switcher {
    padding: 0.625rem 0.875rem;
    border-bottom: 1px solid var(--t-divider);
}

.theme-c .ws-avatar {
    width: 24px; height: 24px; font-size: 0.65rem;
    background: var(--t-accent);
    border-radius: 6px;
}

.theme-c .ws-name { font-size: 0.825rem; color: var(--t-text); }

.theme-c .s-nav {
    padding: 0.375rem 0.5rem;
    flex: 1;
}

.theme-c .s-section { margin-bottom: 0.375rem; }

.theme-c .s-section-label {
    font-size: 0.625rem;
    color: var(--t-text-muted);
    padding: 0.5rem 0.75rem 0.2rem;
    letter-spacing: 0.06em;
}

.theme-c .s-nav-item {
    padding: var(--t-nav-padding);
    font-size: var(--t-font-size);
    color: var(--t-text-secondary);
    border-radius: 6px;
}

.theme-c .s-nav-item:hover { background: var(--t-hover); color: var(--t-text); }
.theme-c .s-nav-item.active { background: var(--t-active-bg); color: var(--t-active-text); font-weight: 600; }
.theme-c .s-nav-item i { font-size: 0.75rem; opacity: 0.6; }
.theme-c .s-nav-item.active i { opacity: 1; }

.theme-c .s-divider {
    margin: 0.375rem 0.75rem;
    border-top: 1px solid var(--t-divider);
}

.theme-c .shell-header {
    height: var(--t-header-height);
    background: var(--t-header-bg);
    border-bottom: 1px solid var(--t-header-border);
    padding: 0 1.5rem;
    font-size: var(--t-font-size);
}

.theme-c .shell-content { background: var(--t-bg); padding: 2rem; }

.theme-c .dash-grid { grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }

.theme-c .dash-card {
    background: var(--t-card-bg);
    border: 1px solid var(--t-card-border);
    box-shadow: var(--t-card-shadow);
    border-radius: var(--t-card-radius);
    font-size: var(--t-font-size);
    padding: 1.5rem;
}

.theme-c .dash-card-title { font-size: 0.8rem; color: var(--t-text-muted); font-weight: 500; }
.theme-c .dash-stat { font-size: 2rem; color: var(--t-text); letter-spacing: -0.02em; }
.theme-c .dash-stat-label { font-size: 0.8rem; color: var(--t-text-muted); }

.theme-c .dash-row {
    padding: 0.5rem 0;
    font-size: var(--t-font-size);
    border-bottom-color: var(--t-divider);
    color: var(--t-text-secondary);
}

.theme-c .dash-badge {
    font-size: 0.7rem;
    background: var(--t-accent-light);
    color: var(--t-accent);
}

.theme-c .dash-bar { height: 4px; background: var(--t-divider); border-radius: 2px; }
.theme-c .dash-bar-fill { background: var(--t-accent); border-radius: 2px; }

.theme-c .user-avatar {
    width: 28px; height: 28px; font-size: 0.7rem;
    background: var(--t-accent);
}

.theme-c .header-search {
    padding: 0.3rem 0.6rem;
    gap: 0.4rem;
    background: var(--t-hover);
    font-size: var(--t-font-size);
    color: var(--t-text-muted);
}

.theme-c .header-search input { font-size: var(--t-font-size); color: var(--t-text); }

/* ==========================================
   Theme label overlay
   ========================================== */
.theme-label {
    position: absolute;
    top: 12px;
    right: 16px;
    background: #111827;
    color: #fff;
    font-size: 0.65rem;
    font-weight: 600;
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    letter-spacing: 0.03em;
    z-index: 10;
    opacity: 0.7;
}
</style>
</head>

<body x-data="{ theme: 'a' }">

<!-- Theme Switcher Bar -->
<div class="theme-bar">
    <span class="theme-bar-title">Theme Preview</span>
    <div class="theme-tabs">
        <button class="theme-tab" :class="{ active: theme === 'a' }" @click="theme = 'a'">A &mdash; Refined</button>
        <button class="theme-tab" :class="{ active: theme === 'b' }" @click="theme = 'b'">B &mdash; Slate</button>
        <button class="theme-tab" :class="{ active: theme === 'c' }" @click="theme = 'c'">C &mdash; Minimal</button>
    </div>
    <span class="theme-bar-hint">Standalone preview &mdash; no styles affected</span>
</div>

<!-- Theme A: Refined -->
<template x-if="theme === 'a'">
<div class="theme-a app-shell" style="position:relative;">
    <span class="theme-label">THEME A &mdash; REFINED</span>
    <!-- Sidebar -->
    <aside class="shell-sidebar">
        <div class="ws-switcher">
            <span class="ws-avatar">A</span>
            <span class="ws-name">Acme Corp</span>
            <i class="fas fa-arrows-rotate ws-swap"></i>
        </div>
        <div class="s-nav">
            <!-- Home -->
            <a href="#" class="s-nav-item active"><i class="fas fa-home"></i> Home</a>
            <hr class="s-divider">

            <!-- Sync -->
            <div class="s-section">
                <div class="s-section-label">Sync</div>
                <a href="#" class="s-nav-item"><i class="fas fa-comments"></i> Chat</a>
                <a href="#" class="s-nav-item"><i class="fas fa-calendar-days"></i> Calendar</a>
                <a href="#" class="s-nav-item"><i class="fas fa-clipboard-list"></i> Board</a>
            </div>
            <hr class="s-divider">

            <!-- Time -->
            <div class="s-section">
                <div class="s-section-label">Time</div>
                <a href="#" class="s-nav-item"><i class="fas fa-clock"></i> Clock</a>
                <a href="#" class="s-nav-item"><i class="fas fa-umbrella-beach"></i> Time Off</a>
            </div>
            <hr class="s-divider">

            <!-- Team -->
            <div class="s-section">
                <div class="s-section-label">Team</div>
                <a href="#" class="s-nav-item"><i class="fas fa-users"></i> People</a>
                <a href="#" class="s-nav-item"><i class="fas fa-user-plus"></i> Hiring</a>
            </div>
            <hr class="s-divider">

            <!-- Resources -->
            <div class="s-section">
                <div class="s-section-label">Resources</div>
                <a href="#" class="s-nav-item"><i class="fas fa-folder"></i> Drive</a>
                <a href="#" class="s-nav-item"><i class="fas fa-book"></i> Knowledge</a>
            </div>
            <hr class="s-divider">

            <a href="#" class="s-nav-item" style="margin-top: auto;"><i class="fas fa-sliders"></i> Settings</a>
        </div>
    </aside>

    <!-- Main -->
    <div class="shell-main">
        <header class="shell-header">
            <div class="d-flex align-items-center" style="gap:0.75rem">
                <span class="fw-semibold" style="font-size:0.9rem">Dashboard</span>
            </div>
            <div class="d-flex align-items-center" style="gap:0.75rem">
                <div class="header-search"><i class="fas fa-search"></i><input type="text" placeholder="Search..." disabled></div>
                <i class="fas fa-bell cursor-pointer" style="opacity:0.4; font-size:0.85rem"></i>
                <span class="user-avatar">JD</span>
            </div>
        </header>
        <div class="shell-content">
            <div class="dash-grid">
