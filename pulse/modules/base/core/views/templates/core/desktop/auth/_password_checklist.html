{# Password strength checklist — reactive via Alpine.js
   Include inside an element with x-data="{ pw: '' }" and an input with x-model="pw" #}
<ul class="list-unstyled small mt-1 mb-0">
    <li :class="pw.length >= 8 ? 'text-success' : 'text-muted'">
        <i class="fas" :class="pw.length >= 8 ? 'fa-check' : 'fa-circle'" style="font-size: 0.5em; vertical-align: middle;"></i>
        {{ _("At least 8 characters") }}
    </li>
    <li :class="/[A-Z]/.test(pw) ? 'text-success' : 'text-muted'">
        <i class="fas" :class="/[A-Z]/.test(pw) ? 'fa-check' : 'fa-circle'" style="font-size: 0.5em; vertical-align: middle;"></i>
        {{ _("One uppercase letter") }}
    </li>
    <li :class="/[a-z]/.test(pw) ? 'text-success' : 'text-muted'">
        <i class="fas" :class="/[a-z]/.test(pw) ? 'fa-check' : 'fa-circle'" style="font-size: 0.5em; vertical-align: middle;"></i>
        {{ _("One lowercase letter") }}
    </li>
    <li :class="/[0-9]/.test(pw) ? 'text-success' : 'text-muted'">
        <i class="fas" :class="/[0-9]/.test(pw) ? 'fa-check' : 'fa-circle'" style="font-size: 0.5em; vertical-align: middle;"></i>
        {{ _("One number") }}
    </li>
</ul>
