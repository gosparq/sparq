<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#E8431A">
    <title>Offline - sparQ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #FEF0EB 0%, #FBCCBB 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .offline-container {
            text-align: center;
            max-width: 400px;
        }

        .offline-icon {
            width: 120px;
            height: 120px;
            background: #E8431A;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 4px 20px rgba(232, 67, 26, 0.3);
        }

        .offline-icon svg {
            width: 60px;
            height: 60px;
            fill: white;
        }

        h1 {
            color: #1f2937;
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        p {
            color: #6b7280;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .retry-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: #E8431A;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .retry-btn:hover {
            background: #C53615;
        }

        .retry-btn:active {
            background: #A12C10;
        }

        .retry-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .status-indicator {
            margin-top: 24px;
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
            color: var(--color-danger);
            font-size: var(--font-size-base);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-indicator.online {
            background: rgba(34, 197, 94, 0.1);
            color: #16a34a;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M23.64 7c-.45-.34-4.93-4-11.64-4-1.5 0-2.89.19-4.15.48L18.18 13.8 23.64 7zM17.04 15.22L3.27 1.44 2 2.72l2.05 2.06C1.91 5.76.59 6.82.36 7L12 21.5l3.07-4.04.91.91 1.34-1.34-1.28-1.28zm-10.76-7.5l8.55 8.55L12 20 4.08 10.21c.97-1.27 2.25-2.24 3.2-2.99z"/>
            </svg>
        </div>

        <h1>{{ _("You're offline") }}</h1>
        <p>{{ _("It looks like you've lost your internet connection. Some features may not be available until you're back online.") }}</p>

        <button class="retry-btn" data-action="retry">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
            </svg>
            {{ _("Try again") }}
        </button>

        <div class="status-indicator" id="statusIndicator">
            <span class="status-dot"></span>
            <span id="statusText">{{ _("No internet connection") }}</span>
        </div>
    </div>

    <script nonce="{{ csp_nonce }}">
        // Update status when connection changes
        function updateStatus() {
            const indicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');

            if (navigator.onLine) {
                indicator.classList.add('online');
                statusText.textContent = 'Connection restored';
                // Auto-reload after connection restored
                setTimeout(() => window.location.reload(), 1500);
            } else {
                indicator.classList.remove('online');
                statusText.textContent = 'No internet connection';
            }
        }

        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);

        // Initial check
        updateStatus();

        document.addEventListener('click', function(e) {
            if (e.target.closest('[data-action="retry"]')) { window.location.reload(); }
        });
    </script>
</body>
</html>
