<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - sparQOne</title>
    <link rel="icon" type="image/png" href="{{ url_for('core_bp.static', filename='images/favicon-96x96.png') }}" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('core_bp.static', filename='images/favicon.svg') }}">
    <link rel="shortcut icon" href="{{ url_for('core_bp.static', filename='images/favicon.ico') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('core_bp.static', filename='images/apple-touch-icon.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Flash messages */
        .flash-messages {
            position: fixed;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1050;
            width: 90%;
            max-width: 500px;
        }
    </style>
    {% block additional_styles %}{% endblock %}
    <meta name="csrf-token" content="{{ csrf_token }}">
    <script nonce="{{ csp_nonce }}">
    (function(){
        var _fetch = window.fetch;
        window.fetch = function(url, opts) {
            opts = opts || {};
            var method = (opts.method || 'GET').toUpperCase();
            if (method !== 'GET' && method !== 'HEAD') {
                var token = document.querySelector('meta[name="csrf-token"]');
                if (token) {
                    opts.headers = opts.headers || {};
                    if (opts.headers instanceof Headers) {
                        if (!opts.headers.has('X-CSRF-Token')) opts.headers.set('X-CSRF-Token', token.content);
                    } else {
                        if (!opts.headers['X-CSRF-Token']) opts.headers['X-CSRF-Token'] = token.content;
                    }
                }
            }
            return _fetch.call(this, url, opts);
        };
    })();
    </script>
</head>
<body hx-headers='{"X-CSRF-Token": "{{ csrf_token }}"}'>
    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-messages">
            {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        </div>
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

    <script nonce="{{ csp_nonce }}" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
