<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _("Request Cancelled") }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cancelled-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 3rem;
            max-width: 500px;
            text-align: center;
        }
        .cancelled-icon {
            width: 80px;
            height: 80px;
            background: #e5e7eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .cancelled-icon i {
            font-size: 2.5rem;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="cancelled-card">
        <div class="cancelled-icon">
            <i class="fas fa-ban"></i>
        </div>

        <h2 class="h4 mb-3">{{ _("Request Cancelled") }}</h2>
        <p class="text-muted mb-4">
            {{ _("This signature request has been cancelled by the sender.") }}
        </p>

        <p class="text-muted small">
            {{ _("Please contact the sender if you have questions.") }}
        </p>
    </div>
</body>
</html>
